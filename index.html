<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Digital Pesisir Bedono | ESC26006</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; overflow: hidden; background-color: #f4f6f9; }
        
        /* Layout Kiri (Peta - 65%) */
        #map-container { width: 65%; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; z-index: 1; }

        /* Layout Kanan (Sidebar Dashboard - 35%) */
        #sidebar { 
            width: 35%; height: 100%; padding: 15px; box-sizing: border-box; 
            background: #ffffff; display: flex; flex-direction: column; gap: 15px;
            box-shadow: -4px 0 10px rgba(0,0,0,0.05); z-index: 10; overflow-y: auto;
        }

        .header { text-align: center; border-bottom: 2px solid #004080; padding-bottom: 10px; }
        .header h1 { margin: 0; font-size: 18px; color: #004080; text-transform: uppercase; }
        .header p { margin: 5px 0 0 0; font-size: 12px; color: #666; }

        /* Panel Pilihan Peta & Waktu */
        .control-group { background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px solid #ddd; }
        .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        select { padding: 5px; border-radius: 4px; border: 1px solid #ccc; font-size: 12px; }
        
        /* Tombol & Slider */
        #playBtn { background: #004080; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; width: 100%; }
        #playBtn:hover { background: #002b5e; }
        .slider-container { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
        input[type=range] { flex-grow: 1; cursor: pointer; }

        /* Panel Data & Impact */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: #fff; padding: 10px; border-radius: 6px; border: 1px solid #ddd; text-align: center; }
        .stat-box h3 { margin: 0; font-size: 11px; color: #666; }
        .stat-box .val { font-size: 20px; font-weight: bold; margin: 5px 0; color: #e74c3c; }
        .stat-box.impact { border-left: 4px solid #c0392b; }

        .status-badge { display: block; padding: 5px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white; text-align: center; margin-top: 5px; }

        /* Area Grafik */
        .chart-container { background: #fff; padding: 10px; border-radius: 6px; border: 1px solid #ddd; height: 180px; }

        /* Kartu Kebijakan */
        .policy-card { background: #eef2f5; padding: 10px; border-radius: 6px; font-size: 12px; }
        .policy-card h3 { margin: 0 0 5px 0; font-size: 13px; color: #333; }

        /* Tombol Zona */
        .zone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .zone-btn { background: #fff; border: 1px solid #ccc; padding: 5px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .zone-btn:hover { background: #004080; color: #fff; }

        /* Legenda */
        .legend { position: absolute; bottom: 20px; left: 20px; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 5px; z-index: 1000; font-size: 11px; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .legend-color { width: 15px; height: 15px; margin-right: 8px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="map"></div>
        <div class="legend">
            <strong>Legenda Spasial</strong>
            <div class="legend-item" style="margin-top: 5px;">
                <div class="legend-color" style="background: rgba(0, 100, 255, 0.6); border: none;"></div>
                <span>Genangan Air (Abrasi)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: transparent; border: 1px dashed #fff; background-color: #555;"></div>
                <span>Daratan/Mangrove</span>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div class="header">
            <h1>TIM ESC26006 | GAMMAFEST 2026</h1>
            <p>Dashboard Monitoring Spatio-Temporal Bedono</p>
        </div>

        <div class="control-group">
            <div class="control-row">
                <label style="font-size: 12px; font-weight:bold;">Tipe Peta:</label>
                <select id="mapTypeSelector">
                    <option value="y">Hybrid (Satelit + Label)</option>
                    <option value="s">Satelit Murni</option>
                    <option value="m">Peta Jalan (Roadmap)</option>
                </select>
            </div>
            <div class="control-row">
                <label style="font-size: 12px; font-weight:bold;">Pilih Tahun:</label>
                <select id="yearDropdown"></select>
            </div>
            <button id="playBtn">▶ Mulai Animasi Perubahan</button>
            <div class="slider-container">
                <span style="font-size: 11px; font-weight:bold;">1990</span>
                <input type="range" id="yearSlider" min="1990" max="2035" value="1990" step="1">
                <span style="font-size: 11px; font-weight:bold; color:#c0392b;">2035</span>
            </div>
        </div>

        <div>
            <span id="statusBadge" class="status-badge" style="background: #7f8c8d;">Memuat Data...</span>
            <div class="stats-grid" style="margin-top: 10px;">
                <div class="stat-box">
                    <h3>Total Luas Air</h3>
                    <div class="val" id="displayArea">--</div>
                    <span style="font-size: 10px;">Hektar (Ha)</span>
                </div>
                <div class="stat-box impact">
                    <h3>Daratan Hilang (vs 1990)</h3>
                    <div class="val" id="displayImpact" style="color: #c0392b;">--</div>
                    <span style="font-size: 10px;">Hektar (Ha)</span>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="trendChart"></canvas>
        </div>

        <div class="policy-card">
            <h3>Fokus Analisis & Kebijakan</h3>
            <p id="policyText" style="margin-top: 5px;">Memuat...</p>
        </div>

        <div>
            <h3 style="font-size: 12px; margin: 0 0 5px 0;">Sorotan Zona Pesisir</h3>
            <div class="zone-grid">
                <button class="zone-btn" onclick="zoomToZone(-6.895, 110.475)">Barat Laut</button>
                <button class="zone-btn" onclick="zoomToZone(-6.895, 110.515)">Timur Laut</button>
                <button class="zone-btn" onclick="zoomToZone(-6.930, 110.475)">Barat Daya</button>
                <button class="zone-btn" onclick="zoomToZone(-6.930, 110.515)">Tenggara</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Setup Peta (Batas dan Center disesuaikan dengan ukuran TIF presisi)
        var mapBounds = [[-6.960, 110.440], [-6.850, 110.550]]; 
        var map = L.map('map', { center: [-6.909, 110.495], zoom: 14, minZoom: 13, maxBounds: mapBounds, maxBoundsViscosity: 1.0 });

        // Layer Peta Dasar Google
        var googleLayers = {
            'y': L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: '© Google Maps' }),
            's': L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: '© Google Maps' }),
            'm': L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: '© Google Maps' })
        };
        googleLayers['y'].addTo(map);

        // Ganti Tipe Peta via Dropdown
        document.getElementById('mapTypeSelector').addEventListener('change', function() {
            for (let key in googleLayers) { map.removeLayer(googleLayers[key]); }
            googleLayers[this.value].addTo(map);
            if(currentOverlay) { currentOverlay.bringToFront(); }
        });

        // Setup Overlay (Berdasarkan Hasil Ekstraksi Python)
        var imageBounds = [[-6.945144956113257, 110.4593626181319], [-6.872920407270048, 110.53158716697511]]; 
        var currentOverlay = null;
        
        // Setup Variabel Data
        var areaData = {};
        var years = [];
        var areas = [];
        var baselineArea = 0;

        // Setup Chart.js (Grafik Kumulatif)
        var ctx = document.getElementById('trendChart').getContext('2d');
        var trendChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Data Aktual', borderColor: '#2980b9', backgroundColor: 'rgba(41, 128, 185, 0.2)', fill: true, data: [], tension: 0.2, pointRadius: 2 },
                { label: 'Data Prediksi', borderColor: '#c0392b', backgroundColor: 'rgba(192, 57, 43, 0.2)', borderDash: [5, 5], fill: true, data: [], tension: 0.2, pointRadius: 2 }
            ]},
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 10, font: {size: 9} } } },
                scales: { x: { ticks: { font: {size: 9} } }, y: { ticks: { font: {size: 9} }, title: {display: true, text: 'Luas Air (Ha)', font: {size: 9}} } },
                animation: { duration: 400 } // Transisi mulus saat update
            }
        });

        // 2. Load Data JSON
        fetch('dashboard_assets/stats_bedono.json')
            .then(response => response.json())
            .then(data => {
                areaData = data;
                var dropdown = document.getElementById('yearDropdown');
                for (let year = 1990; year <= 2035; year++) {
                    years.push(year);
                    areas.push(areaData[year]);
                    let option = document.createElement("option");
                    option.text = year; option.value = year;
                    dropdown.add(option);
                }
                baselineArea = areaData[1990]; // Simpan luasan awal 1990
                updateMapAndInfo(1990);
            });

        // 3. Fungsi Utama Pembaruan UI
        function updateMapAndInfo(selectedYear) {
            selectedYear = parseInt(selectedYear);
            var currentArea = areaData[selectedYear];
            
            // Sinkronisasi Kontrol (Slider & Dropdown)
            document.getElementById('yearSlider').value = selectedYear;
            document.getElementById('yearDropdown').value = selectedYear;
            
            // Update Teks Angka
            document.getElementById('displayArea').innerText = currentArea.toFixed(2);
            var impact = currentArea - baselineArea;
            document.getElementById('displayImpact').innerText = impact > 0 ? "+" + impact.toFixed(2) : impact.toFixed(2);

            // Update Status & Kebijakan (Pemisahan Aktual 2025 vs Prediksi)
            var badge = document.getElementById('statusBadge');
            var policy = document.getElementById('policyText');
            if (selectedYear <= 2025) {
                badge.innerText = "Data Aktual (" + selectedYear + ")";
                badge.style.background = "#2980b9"; // Biru
                policy.innerText = "Fase perekaman data satelit aktual. Laju luasan air terekam sebagai basis pembelajaran model U-Net.";
            } else {
                badge.innerText = "Data Prediksi AI (" + selectedYear + ")";
                badge.style.background = "#c0392b"; // Merah
                policy.innerText = "Fase forecasting AI. Terlihat eskalasi genangan tinggi. Prioritaskan restorasi mangrove & relokasi publik.";
            }

            // Update Peta
            if (currentOverlay) { map.removeLayer(currentOverlay); }
            currentOverlay = L.imageOverlay('dashboard_assets/maps/map_' + selectedYear + '.png', imageBounds, { opacity: 0.85 }).addTo(map);

            // Update Grafik (Cumulative Reveal)
            var actualData = [];
            var predictData = [];
            for (let i = 0; i < years.length; i++) {
                let y = years[i];
                if (y > selectedYear) {
                    actualData.push(null);
                    predictData.push(null);
                } else {
                    if (y <= 2025) {
                        actualData.push(areas[i]);
                        // Agar garis tidak terputus, tambahkan data 2025 ke awal grafik prediksi
                        predictData.push(y === 2025 ? areas[i] : null); 
                    } else {
                        actualData.push(null);
                        predictData.push(areas[i]);
                    }
                }
            }
            trendChart.data.labels = years;
            trendChart.data.datasets[0].data = actualData;
            trendChart.data.datasets[1].data = predictData;
            trendChart.update();
        }

        // Event Listener Manual
        document.getElementById('yearSlider').addEventListener('input', function() { updateMapAndInfo(this.value); });
        document.getElementById('yearDropdown').addEventListener('change', function() { updateMapAndInfo(this.value); });

        // Logika Animasi
        var playBtn = document.getElementById('playBtn');
        var timer = null;
        var isPlaying = false;

        playBtn.addEventListener('click', function() {
            if (isPlaying) {
                clearInterval(timer);
                playBtn.innerText = '▶ Mulai Animasi Perubahan';
                playBtn.style.background = '#004080';
                isPlaying = false;
            } else {
                if (parseInt(document.getElementById('yearSlider').value) === 2035) { updateMapAndInfo(1990); }
                playBtn.innerText = '⏸ Jeda Animasi';
                playBtn.style.background = '#e74c3c';
                isPlaying = true;

                timer = setInterval(function() {
                    var currentVal = parseInt(document.getElementById('yearSlider').value);
                    if (currentVal < 2035) {
                        updateMapAndInfo(currentVal + 1);
                    } else {
                        clearInterval(timer);
                        playBtn.innerText = '▶ Mulai Animasi Perubahan';
                        playBtn.style.background = '#004080';
                        isPlaying = false;
                    }
                }, 800); // Kecepatan 0.8 detik per frame
            }
        });

        // Zoom Zona
        function zoomToZone(lat, lng) { map.flyTo([lat, lng], 15, { animate: true, duration: 1.2 }); }
    </script>
</body>
</html>
